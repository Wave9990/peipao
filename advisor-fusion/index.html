    :root {

      --paper-strong:#fffaf2;
      --blue:#255dd6;
      --green:#12825c;
      --orange:#d96c2c;
      --red:#c83a3a;

    }

    .panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(16px);overflow:hidden}

    .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;font-weight:800}

    .hero-side{padding:20px;display:grid;gap:10px;background:rgba(255,255,255,.62)}
    .metric-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .metric{padding:16px;border-radius:18px;background:rgba(255,255,255,.72);border:1px solid var(--line)}
    .metric .k{font-size:12px;color:var(--muted);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}
    .metric .v{font-size:30px;font-weight:900;letter-spacing:-.04em;margin-top:4px}
    .summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:0 0 14px}
    .summary-card{padding:16px;border-radius:20px;background:rgba(255,255,255,.70);border:1px solid var(--line);box-shadow:0 12px 34px rgba(65,47,25,.08)}

    .summary-row{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px solid rgba(23,32,51,.06);font-size:12px;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}

    .explain-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:12px;margin:0 0 14px}
    .explain-card{padding:16px;border-radius:20px;background:rgba(255,255,255,.70);border:1px solid var(--line);box-shadow:0 12px 34px rgba(65,47,25,.08)}

    .tab{border:1px solid var(--line);background:rgba(255,255,255,.62);padding:11px 15px;border-radius:999px;font-size:13px;color:#596579;font-weight:800;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;white-space:nowrap;cursor:pointer}

    .control{background:rgba(255,255,255,.68);border:1px solid var(--line);border-radius:16px;padding:10px}

    .view{display:none}.view.active{display:block}
    .section-title{display:flex;justify-content:space-between;gap:12px;align-items:end;margin:8px 2px 12px}
    .section-title h2{margin:0;font-size:24px;letter-spacing:-.03em}
    .section-title p{margin:4px 0 0;color:var(--muted);font-size:13px;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}
    .tier-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .tier-card{padding:16px;border-radius:22px;border:1px solid var(--line);background:rgba(255,255,255,.72);box-shadow:0 14px 40px rgba(65,47,25,.08)}

    .tier-card[data-tier="新第二梯队"]{background:linear-gradient(145deg,rgba(255,242,203,.92),rgba(255,255,255,.76))}

    .tier-list{display:grid;gap:9px;max-height:760px;overflow:auto;padding-right:3px}
    .person{display:grid;grid-template-columns:40px minmax(0,1fr) 70px;gap:10px;align-items:start;padding:10px;border-radius:16px;background:rgba(255,255,255,.64);border:1px solid rgba(23,32,51,.08)}
    .rank{width:40px;height:40px;border-radius:13px;background:#172033;color:#fff;display:grid;place-items:center;font-weight:900;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}
    .name{font-size:16px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .meta{font-size:12px;color:var(--muted);line-height:1.65;margin-top:3px;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}

    .pill{display:inline-flex;align-items:center;padding:5px 8px;border-radius:999px;background:rgba(23,32,51,.06);font-size:11px;color:#334155;font-weight:800;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}

    .score{text-align:right;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}.score .num{font-size:20px;font-weight:900}.score .txt{font-size:11px;color:var(--muted)}

    .reason div{margin-top:5px;color:var(--muted);font-size:11px;line-height:1.6}

    .info-card{padding:16px;border-radius:20px;background:rgba(255,255,255,.72);border:1px solid var(--line)}

    th,td{padding:12px 13px;border-bottom:1px solid rgba(23,32,51,.08);font-size:13px;text-align:left;white-space:nowrap}

    tr:last-child td{border-bottom:0}
    .anomaly{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .empty{padding:22px;text-align:center;color:var(--muted);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}

      .hero-main{padding:22px}.metric .v{font-size:25px}.person{grid-template-columns:38px minmax(0,1fr)}.score{grid-column:2;text-align:left}.rank{width:38px;height:38px}

</head>

        <div class="cards" id="ownerCards"></div>
      </section>
      <section class="view" id="view-anomaly">
        <div class="section-title"><div><h2>异常校验</h2><p>把可能导致看板不可信的问题直接列出来。</p></div></div>

      </section>

    const filters = { tier:'全部', owner:'全部', source:'全部', status:'全部', keyword:'' };

    function init() {
      byId('tabs').innerHTML = tabs.map(([key, label]) => '<button class="tab ' + (key === activeTab ? 'active' : '') + '" data-tab="' + key + '">' + label + '</button>').join('');
      document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        render();
      }));
      fillSelect('tierFilter', ['全部', ...orderTiers], 'tier');
      fillSelect('ownerFilter', ['全部', ...uniq(rows.map(r => r['归属运营']))], 'owner');
      fillSelect('sourceFilter', ['全部', ...uniq(rows.map(r => r['来源类型']))], 'source');
      fillSelect('statusFilter', ['全部', ...uniq(rows.map(r => r['当期陪跑状态']))], 'status');
      byId('keywordFilter').addEventListener('input', e => { filters.keyword = e.target.value.trim().toLowerCase(); render(); });
      render();
    }

    function fillSelect(id, options, key) {
      const el = byId(id);
      el.innerHTML = options.map(item => '<option value="' + item + '">' + item + '</option>').join('');
      el.addEventListener('change', e => { filters[key] = e.target.value; render(); });
    }

    function filteredRows() {
      return rows.filter(row => {
        if (filters.tier !== '全部' && row['新梯度'] !== filters.tier) return false;
        if (filters.owner !== '全部' && row['归属运营'] !== filters.owner) return false;
        if (filters.source !== '全部' && row['来源类型'] !== filters.source) return false;
        if (filters.status !== '全部' && row['当期陪跑状态'] !== filters.status) return false;
        if (filters.keyword) {
          const hay = [row['家顾姓名'], row['账号名称'], row['主看板门店'], row['主看板大区'], row['归属运营']].join('|').toLowerCase();
          if (!hay.includes(filters.keyword)) return false;
        }
        return true;
      });
    }

    function render() {
      document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === activeTab));
      document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
      byId('view-' + activeTab).classList.add('active');
      renderMetrics();
      renderStatusStrip();
      renderSummaryGrid();
      renderExplainGrid();
      const list = filteredRows();
      renderRanking(list);
      renderOriginal(list);
      renderNew(list);
      renderOwners();
      renderAnomalies();
    }

    function renderMetrics() {
      const scope = summary.scope || {};
      const totals = summary.totals || {};
      const metrics = [
        ['总家顾数', scope['总家顾数'] || rows.length],
        ['原119覆盖', scope['原119覆盖'] || 0],
        ['新增家顾', scope['全盘新增家顾'] || 0],
        ['施工金额', fmtWan(totals['施工金额(万)'] || 0)]
      ];
      byId('metricGrid').innerHTML = metrics.map(([k, v]) => '<div class="metric"><div class="k">' + k + '</div><div class="v">' + v + '</div></div>').join('');
    }

    function renderStatusStrip() {
      const generatedAt = summary.generatedAt ? summary.generatedAt.replace('T', ' ') : '未知';
      const badges = [
        ['数据周期', summary.dataPeriod || '2026年累计', ''],
        ['当前月', summary.activeMonth || '未知', ''],
        ['更新时间', generatedAt, ''],
        ['状态', summary.releaseMode || '日更观察版', 'live']
      ];
      byId('statusStrip').innerHTML = badges.map(([k, v, cls]) => '<span class="status-badge ' + cls + '">' + k + '：' + v + '</span>').join('');
    }

    function renderSummaryGrid() {
      const tierCounts = summary.newTierCounts || {};
      const totals = summary.totals || {};
      const scope = summary.scope || {};
      const ownerTop = (summary.ownerSummary || []).slice().sort((a,b) => Number(b['施工金额(万)'] || 0) - Number(a['施工金额(万)'] || 0)).slice(0, 3);
      const anomalies = summary.anomalies || {};
      const anomalyCount = Object.values(anomalies).reduce((sum, arr) => sum + (Array.isArray(arr) ? arr.length : 0), 0);
      const cards = [
        {
          title: '新梯度结构',
          rows: orderTiers.map(tier => [tier.replace('新',''), (tierCounts[tier] || 0) + '人'])
        },
        {
          title: '经营数据总览',
          rows: [['设计签单', (totals['设计签单'] || 0) + '单'], ['施工签单', (totals['施工签单'] || 0) + '单'], ['施工金额', fmtWan(totals['施工金额(万)'] || 0)]]
        },
        {
          title: (summary.activeMonth || '当前月') + '月度表现',
          rows: [['设计签单', (totals['当前月设计签单'] || 0) + '单'], ['施工签单', (totals['当前月施工签单'] || 0) + '单'], ['施工金额', fmtWan(totals['当前月施工金额(万)'] || 0)]]
        },
        {
          title: '运营金额 TOP3',
          rows: ownerTop.map(item => [item['运营'], fmtWan(item['施工金额(万)'])])
        },
        {
          title: '需要关注',
          rows: [['异常项', anomalyCount + '个'], ['待激活观察', (scope['待激活观察'] || 0) + '人'], ['新增家顾', (scope['全盘新增家顾'] || 0) + '人']]
        }
      ];
      byId('summaryGrid').innerHTML = cards.map(card => '<div class="summary-card"><strong>' + card.title + '</strong>'
        + card.rows.map(([k, v]) => '<div class="summary-row"><span>' + k + '</span><span>' + v + '</span></div>').join('')
        + '</div>').join('');
    }

    function renderExplainGrid() {
      const cards = [
        {
          title: '评分说明',
          text: summary.scoringPolicy || '综合评分会同时参考原梯队、设计签单、施工签单、施工金额、历史业绩和管理状态。'
        },
        {
          title: '自动更新规则',
          text: summary.monthlySnapshotPolicy || '页面每日自动刷新；月度正式名单建议人工确认后定版。'
        }
      ];
      byId('explainGrid').innerHTML = cards.map(card => '<div class="explain-card"><strong>' + card.title + '</strong><p>' + card.text + '</p></div>').join('');
    }

    function personCard(row) {
      const sourceCls = row['来源类型'] === '全盘新增家顾' ? 'new' : '';
      const statusCls = row['当期陪跑状态'] === '暂无当期陪跑签单' ? 'warn' : 'hot';
      return '<div class="person">'
        + '<div class="rank">#' + row['新排名'] + '</div>'
        + '<div>'
        + '<div class="name">' + row['家顾姓名'] + '</div>'
        + '<div class="meta">' + row['归属运营'] + '｜原' + row['原梯队'] + '｜查找 ' + (row['主看板查找家顾'] || row['家顾姓名']) + '｜' + (row['主看板门店'] || row['原始区域'] || '未记录门店') + '</div>'
        + '<div class="meta">设计 ' + row['设计签单'] + '｜施工 ' + row['施工签单'] + '｜金额 ' + fmtWan(row['施工金额(万)']) + '</div>'
        + '<div class="pill-row"><span class="pill ' + sourceCls + '">' + row['来源类型'] + '</span><span class="pill ' + statusCls + '">' + row['当期陪跑状态'] + '</span></div>'
        + '<details class="reason"><summary>排名依据 / 推荐动作</summary><div>' + row['加权依据'] + '<br>' + row['推荐动作'] + '</div></details>'
        + '</div>'
        + '<div class="score"><div class="txt">评分</div><div class="num">' + row['综合评分'] + '</div></div>'
        + '</div>';
    }

    function renderRanking(list) {
      byId('tierGrid').innerHTML = orderTiers.map(tier => {
        const tierRows = list.filter(row => row['新梯度'] === tier).sort((a,b) => a['新排名'] - b['新排名']);
        const active = tierRows.filter(row => row['当期陪跑状态'] !== '暂无当期陪跑签单').length;
        const original = tierRows.filter(row => row['是否原119体系'] === '是').length;
        return '<section class="tier-card" data-tier="' + tier + '">'
          + '<div class="tier-head"><div><div class="tier-name">' + tier + '</div><div class="tier-count">' + tierRows.length + ' 人｜原119 ' + original + '｜有数据 ' + active + '</div></div><span class="pill hot">' + tier.replace('新','') + '</span></div>'
          + '<div class="tier-list">' + (tierRows.map(personCard).join('') || '<div class="empty">当前筛选下暂无人员</div>') + '</div>'
          + '</section>';
      }).join('');
    }

    function renderTable(id, list) {
      const head = ['新排名','家顾姓名','来源类型','原梯队','新梯度','归属运营','设计签单','施工签单','施工金额(万)','当前月施工金额(万)','推荐动作'];
      byId(id).innerHTML = '<thead><tr>' + head.map(h => '<th>' + h + '</th>').join('') + '</tr></thead><tbody>'
        + list.map(row => '<tr>' + head.map(h => '<td>' + (row[h] ?? '') + '</td>').join('') + '</tr>').join('')
        + '</tbody>';
    }

    function renderOriginal(list) {
      renderTable('originalTable', list.filter(row => row['是否原119体系'] === '是').sort((a,b) => a['新排名'] - b['新排名']));
    }

    function renderNew(list) {
      renderTable('newTable', list.filter(row => row['是否原119体系'] === '否').sort((a,b) => a['新排名'] - b['新排名']));
    }

    function renderOwners() {
      const owners = (summary.ownerSummary || []).slice().sort((a,b) => Number(b['施工金额(万)'] || 0) - Number(a['施工金额(万)'] || 0));
      const maxAmount = Math.max(...owners.map(owner => Number(owner['施工金额(万)'] || 0)), 1);
      byId('ownerCards').innerHTML = owners.map(owner => '<div class="info-card">'
        + '<strong>' + owner['运营'] + '</strong>'
        + '<div class="bar"><span style="width:' + Math.max(3, Number(owner['施工金额(万)'] || 0) / maxAmount * 100) + '%"></span></div>'
        + '<p>家顾 ' + owner['家顾数'] + ' 人｜原119 ' + owner['原119家顾'] + '｜新增 ' + owner['新增家顾'] + '</p>'
        + '<p>2026累计：设计 ' + owner['设计签单'] + '｜施工 ' + owner['施工签单'] + '｜金额 ' + fmtWan(owner['施工金额(万)']) + '</p>'
        + '<p>' + (owner['当前月'] || summary.activeMonth || '当前月') + '：设计 ' + (owner['当前月设计签单'] || 0) + '｜施工 ' + (owner['当前月施工签单'] || 0) + '｜金额 ' + fmtWan(owner['当前月施工金额(万)'] || 0) + '</p>'
        + '<p>新一 ' + owner['新第一梯队'] + '｜新二 ' + owner['新第二梯队'] + '｜新三 ' + owner['新第三梯队'] + '｜新四 ' + owner['新第四梯队'] + '</p>'
        + '</div>').join('');
    }

    function renderAnomalies() {
      const anomalies = summary.anomalies || {};
      byId('anomalyCards').innerHTML = Object.entries(anomalies).map(([title, items]) => '<div class="info-card">'
        + '<strong>' + title + '（' + items.length + '）</strong>'
        + (items.length ? '<p>' + items.slice(0, 10).map(item => item['家顾姓名'] + '：' + item['原因']).join('<br>') + '</p>' : '<p>暂无异常。</p>')
        + '</div>').join('');
    }

    init();
  </script>
</body>
</html>
